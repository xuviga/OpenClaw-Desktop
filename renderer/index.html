<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>OpenClaw Desktop Client</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-icon">👻</span>
        <h1>OpenClaw Desktop</h1>
      </div>
      <div id="status-indicator" class="status-badge disconnected">
        <span class="status-dot"></span>
        <span class="status-text">Отключено</span>
      </div>
    </header>

    <main>
      <section class="config-section">
        <h2>Настройки подключения</h2>
        <form id="config-form">
          <div class="form-group">
            <label for="host">Gateway Host</label>
            <input type="text" id="host" placeholder="127.0.0.1" value="127.0.0.1">
          </div>

          <div class="form-group">
            <label for="port">Port</label>
            <input type="number" id="port" placeholder="18789" value="18789">
          </div>

          <div class="form-group checkbox">
            <input type="checkbox" id="tls">
            <label for="tls">Использовать TLS (wss://)</label>
          </div>

          <div class="form-group">
            <label for="token">Токен авторизации</label>
            <input type="password" id="token" placeholder="Введите токен">
          </div>

          <div class="form-group">
            <label for="displayName">Имя устройства</label>
            <input type="text" id="displayName" placeholder="MyPC">
          </div>

          <div class="button-group">
            <button type="submit" id="connect-btn" class="btn primary">
              <span class="btn-icon">🔗</span> Подключиться
            </button>
            <button type="button" id="disconnect-btn" class="btn danger" disabled>
              <span class="btn-icon">❌</span> Отключиться
            </button>
          </div>
        </form>
      </section>

      <section class="info-section">
        <h2>Информация</h2>
        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">Node ID</span>
            <span id="node-id" class="info-value">-</span>
          </div>
          <div class="info-item">
            <span class="info-label">Платформа</span>
            <span id="platform" class="info-value">-</span>
          </div>
          <div class="info-item">
            <span class="info-label">Статус</span>
            <span id="connection-status" class="info-value">Не подключено</span>
          </div>
        </div>
      </section>

      <section class="capabilities-section">
        <h2>Возможности</h2>
        <div class="capabilities-grid">
          <div class="capability-card">
            <span class="capability-icon">📸</span>
            <span class="capability-name">Скриншоты</span>
          </div>
          <div class="capability-card">
            <span class="capability-icon">📋</span>
            <span class="capability-name">Буфер обмена</span>
          </div>
          <div class="capability-card">
            <span class="capability-icon">📁</span>
            <span class="capability-name">Файлы</span>
          </div>
          <div class="capability-card">
            <span class="capability-icon">💻</span>
            <span class="capability-name">Shell</span>
          </div>
          <div class="capability-card">
            <span class="capability-icon">🖱️</span>
            <span class="capability-name">UI Click</span>
          </div>
          <div class="capability-card">
            <span class="capability-icon">⌨️</span>
            <span class="capability-name">UI Type</span>
          </div>
          <div class="capability-card">
            <span class="capability-icon">🔔</span>
            <span class="capability-name">Уведомления</span>
          </div>
          <div class="capability-card">
            <span class="capability-icon">📊</span>
            <span class="capability-name">Метрики</span>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>OpenClaw Desktop Client v1.0.0</p>
      <p class="footer-hint">Приложение сворачивается в трей при закрытии</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
